<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Wave Simulation - Portal</title>
    <style>
        :root {
            --bg-dark: #040814;
            --panel-bg: rgba(13, 27, 54, 0.65);
            --panel-border: rgba(0, 242, 254, 0.2);
            --neon-cyan: #00f2fe;
            --neon-blue: #0076ff;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --glow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 118, 255, 0.15) 0%, rgba(0, 242, 254, 0.03) 70%, transparent 100%);
            top: -10%;
            left: -10%;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0, 76, 255, 0.02) 60%, transparent 100%);
            bottom: -5%;
            right: -5%;
            z-index: 0;
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 118, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 118, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 850px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 55px 40px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(0, 242, 254, 0.05);
            margin-bottom: 30px;
            box-shadow: inset 0 0 8px rgba(0, 242, 254, 0.1);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0 0 45px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a5f3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            color: var(--neon-cyan);
            -webkit-text-fill-color: initial;
            text-shadow: var(--glow);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        @media (max-width: 650px) {
            .info-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .info-item {
            background: rgba(4, 8, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 18px;
            border-radius: 12px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .info-item:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 242, 254, 0.2);
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .team-box {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 30px;
            margin-bottom: 45px;
        }

        .team-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 18px;
            font-weight: 700;
        }

        .team-members {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .member-tag {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e1;
            transition: all 0.25s ease;
        }

        .member-tag:hover {
            color: var(--neon-cyan);
            border-color: rgba(0, 242, 254, 0.4);
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .action-cluster {
            display: flex;
            justify-content: center;
        }

        .btn {
            padding: 16px 50px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--neon-blue), #00d2ff);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 118, 255, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.5);
            filter: brightness(1.1);
        }

        .btn-icon {
            font-size: 1.2rem;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    <div class="grid-overlay"></div>

    <div class="wrapper">
        <main class="main-card">
            <div class="badge">Physics For Engineers</div>
            
            <h1>Mechanical Wave <span>Simulator</span></h1>

            <!-- Grid displays Subject and Section symmetrically after removing System Build -->
            <section class="info-grid" aria-label="Project Information">
                <div class="info-item">
                    <div class="info-label">Subject</div>
                    <div class="info-value">Physics For Engineers</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Section</div>
                    <div class="info-value">BSCPE 201</div>
                </div>
            </section>

            <section class="team-box">
                <div class="team-title">Members</div>
                <div class="team-members">
                    <span class="member-tag">DACULA</span>
                    <span class="member-tag">FAUSTINO</span>
                    <span class="member-tag">NALANGAN</span>
                    <span class="member-tag">MANAGBANAG</span>
                    <span class="member-tag">NICOLAS</span>
                    <span class="member-tag">MONES</span>
                    <span class="member-tag">LASPINAS</span>
                </div>
            </section>

            <div class="action-cluster">
                <a href="index.html" class="btn btn-primary">
                    <span>Run Simulation</span>
                    <span class="btn-icon">⚡</span>
                </a>
            </div>
        </main>
    </div>

</body>
</html>
