<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Wave Simulation</title>
   
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Mechanical Wave Simulation</h1>
    </header>

    <div class="simulation-box">
        
        <div>
            <canvas id="waveCanvas" width="650" height="350"></canvas>
            
            
            <div class="stats">
                <h3>Calculated Wave Parameters (SI Units Output)</h3>
                <p>Wave Speed (v): <span id="outSpeed">0.00</span> m/s</p>
                <p>Wavelength (&lambda;): <span id="outLambda">0.00</span> m</p>
                <p>Angular Frequency (&omega;): <span id="outOmega">0.00</span> rad/s</p>
                <p>Wave Number (k): <span id="outK">0.00</span> rad/m</p>
            </div>
        </div>

       
        <div class="controls">
            
            <div class="control-group">
                <label for="waveType">Wave Mode</label>
                <select id="waveType">
                    <option value="pulse" selected>Manual Pulse</option>
                    <option value="oscillate">Continuous Oscillate</option>
                </select>
            </div>

            
            <div class="control-group">
                <label for="ampUnit">Amplitude Unit</label>
                <select id="ampUnit">
                    <option value="cm">Centimeters (cm)</option>
                    <option value="m">Meters (m)</option>
                    <option value="in">Inches (in)</option>
                </select>
                <input type="number" id="ampInput" value="40" min="1" max="100">
            </div>

            
            <div class="control-group">
                <label for="freqSlider">Frequency: <span id="freqVal" class="value-display">1.50</span> Hz</label>
                <input type="range" id="freqSlider" min="0.5" max="3.0" step="0.1" value="1.5">
            </div>

            
            <div class="control-group">
                <label for="tensionSlider">Tension: <span id="tensionVal" class="value-display">Medium</span></label>
                <input type="range" id="tensionSlider" min="10" max="50" step="20" value="30">
            </div>

           
            <div class="control-group" id="pulseBtnContainer" style="display: block; margin-bottom: 25px;">
                <button class="btn-pulse" id="pulseBtn">Trigger Pulse</button>
            </div>

           
            <div class="control-group" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; margin-bottom: 0;">
                <a href="index.html" class="btn-portal">
                    <span>⌂</span> Return Home
                </a>
            </div>
        </div>
    </div>
</div>


<script src="script.js"></script>
</body>
</html>
